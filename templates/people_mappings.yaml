# people_mappings.yaml
# Who has context in each program. Used for action item follow-up, reviewer selection,
# and contributor expertise queries.
# Update when people join or leave programs — typically when roles change, not every sprint.

your-program-name:
  owner: "@handle"                     # single accountable person
  leads:                               # technical or functional leads with deep context
    - "@handle"
  contributors:                        # active this cycle — not all-time history
    - "@handle"
    - "@handle"
  notify:                              # who to ping when action items go stale
    - "@handle"
  slack_ids:                           # Slack user IDs needed to send DMs via API
    "@handle": "UXXXXXXXXXX"           # find: right-click user in Slack → View profile → Copy ID

# Example:
#
# enterprise-readiness:
#   owner: "@sarah"
#   leads:
#     - "@marcus"
#   contributors:
#     - "@alex"
#     - "@jordan"
#     - "@priya"
#   notify:
#     - "@sarah"
#     - "@marcus"
#   slack_ids:
#     "@sarah": "U04A1B2C3D4"
#     "@marcus": "U05E6F7G8H9"
