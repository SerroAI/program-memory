# program_mappings.yaml
# One file, one source of truth per program.
# Update when people, sources, or charters change.

your-program-name:
  # Who owns and works on this program
  owner: "@handle"
  charter: "One sentence: what this program is and why it matters. Quarter target."
  leads:
    - "@handle"
  contributors:
    - "@handle"
  notify:                      # pinged when action items go stale
    - "@handle"
  slack_ids:                   # needed to send DM follow-ups via Slack API
    "@handle": "UXXXXXXXXXX"   # right-click user in Slack → View profile → Copy ID

  # Where signals live
  github:
    repos:
      - org/repo-name
    label_filter: "optional-label"   # only PRs/issues with this label; omit to get all
  slack:
    channels:
      - channel-name
  drive:
    folders:
      - "Folder Name in Drive"
  meetings:
    series:
      - "Meeting Title (as it appears in Google Calendar)"

