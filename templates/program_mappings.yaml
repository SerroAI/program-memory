# program_mappings.yaml
# One entry per active program. Agents read this file before querying any source.
# Update when channels, repos, or meetings change (typically once a quarter).

your-program-name:
  owner: "@handle"
  charter: "One sentence: what this program is and why it matters. Quarter target."
  github:
    repos:
      - org/repo-name
    label_filter: "optional-label"   # only PRs/issues with this label; omit to get all
  slack:
    channels:
      - channel-name
  drive:
    folders:
      - "Folder Name in Drive"
  meetings:
    series:
      - "Meeting Title (as it appears in Google Calendar)"

